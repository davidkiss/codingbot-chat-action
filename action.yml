name: "CodingBot Chat"
description: "AI-powered coding assistant that processes GitHub issues and creates PRs"
author: "David Kiss"
branding:
  icon: "message-square"
  color: "green"

inputs:
  model:
    description: "AI model to use"
    required: false
    default: "google-genai:gemini-3-flash-preview"
  prompt-template:
    description: "System prompt template"
    required: false
    default: "You're an expert AI coding assistant. Follow the steps below:\n\n1. Brainstorm task from user {user} and save the generated specs.\n2. Confirm tasks with user then save task breakdown and output it to the user.\n3. Confirm if user is ready to implement the changes.\n4. After user confirmed, implement the code changes based on the specs and task breakdown.\n5. Final output should be <DONE> if the code changes are completed"
  skills-path:
    description: "Path to agent skills"
    required: false
    default: "~/.agents/skills/"
  skills:
    description: >
      Semicolon-separated list of skills to install.
      Format: package:skill1,skill2;package2:skill3 (e.g., davidkiss/smart-ai-skills:coding,brainstorming)
    required: false
    default: "davidkiss/smart-ai-skills:reflection,brainstorming,task-breakdown,coding,subagent-task-execution"
  github-token:
    description: "GitHub token"
    required: false
    default: ${{ secrets.GITHUB_TOKEN }}

outputs:
  response-file:
    description: "Path to generated response file"
    value: ${{ steps.setup.outputs.response-file }}
  pr-url:
    description: "URL of created PR"
    value: ${{ steps.post-response.outputs.pr-url }}

runs:
  using: "composite"
  steps:
    - id: setup
      name: Setup environment
      shell: bash
      run: |
        echo "response-file=bot_response.md" >> $GITHUB_OUTPUT
        ls -al ${{ github.action_path }}/package-lock.json
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Acknowledge Comment # reaction to issue is not supported atm
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "issue_comment" ]; then
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content='eyes'
        fi
      env:
        GH_TOKEN: ${{ inputs.github-token }}

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Prepare Lockfile for Caching
      shell: bash
      run: cp ${{ github.action_path }}/package-lock.json .codingbot-package-lock.json

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: .codingbot-package-lock.json

    - name: Install dependencies
      shell: bash
      run: |
        cd ${{ github.action_path }}
        npm install

    - name: Add Agent skills
      shell: bash
      run: |
        SKILLS="${{ inputs.skills }}"
        
        # Parse skills input: package:skill1,skill2;package2:skill3,skill4
        # Split by semicolon to get individual package specs
        IFS=';' read -ra PACKAGE_SPECS <<< "$SKILLS"
        
        for spec in "${PACKAGE_SPECS[@]}"; do
          # Skip empty specs
          [ -z "$spec" ] && continue
          
          # Split by colon to get package and skills list
          IFS=':' read -ra PARTS <<< "$spec"
          package="${PARTS[0]}"
          skills_list="${PARTS[1]:-}"
          
          if [ -z "$skills_list" ] || [ "$skills_list" = "*" ]; then
            # Install all skills from package
            echo "Installing all skills from $package"
            npx skills add "$package" -a opencode -g --skill '*' --yes || echo "Warning: Failed to install skills from $package"
          else
            # Install specific skills (comma-separated list)
            IFS=',' read -ra SKILLS <<< "$skills_list"
            skill_flags=""
            for skill in "${SKILLS[@]}"; do
              skill_flags="$skill_flags --skill $skill"
            done
            echo "Installing skills from $package: $skills_list"
            npx skills add "$package" -a opencode -g $skill_flags --yes || echo "Warning: Failed to install skills from $package"
          fi
        done

    - name: Fetch Issue Data
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
      run: gh issue view $ISSUE_NUMBER --json body,comments,author,number,title > chat_history.json

    - name: Run Agent
      shell: bash
      env:
        MODEL: ${{ inputs.model }}
        PROMPT_TEMPLATE: ${{ inputs.prompt-template }}
        SKILLS_PATH: ${{ inputs.skills-path }}
        GOOGLE_API_KEY: ${{ env.GOOGLE_API_KEY }}
        OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
      run: npx tsx ${{ github.action_path }}/src/index.ts chat_history.json

    - id: post-response
      name: Post Response to GitHub
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        ISSUE_TITLE: ${{ github.event.issue.title }}
      run: bash scripts/post_response.sh "$ISSUE_NUMBER" "$ISSUE_TITLE"
      continue-on-error: true

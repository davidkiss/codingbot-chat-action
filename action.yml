name: "CodingBot Chat"
description: "AI-powered coding assistant that processes GitHub issues and creates PRs"
author: "David Kiss"
branding:
  icon: "message-square"
  color: "green"

inputs:
  model:
    description: "AI model to use"
    required: false
    default: "google-genai:gemini-3-flash-preview"
  prompt-template:
    description: "System prompt template"
    required: false
    default: |
      You're an expert AI coding assistant. 
      Depending on the task details from user {user}, follow the appropriate steps below:
      - **Implementing a new feature**:
        1. Brainstorm implementing a new feature  and save the generated specs
        2. Confirm tasks with user then save task breakdown and output it to the user.
        3. Confirm if user is ready to implement the changes.
        4. After user confirmed, implement the code changes based on the specs and task breakdown.
        5. Final output should be <DONE>, if the code changes are completed
      - **Troubleshooting an issue**:
        1. Use the @systematic-debugger skill to troubleshoot the issue and implement the code changes to fix the issue.
        2. Final output should be <DONE>, if the code changes are completed
  skills-path:
    description: "Path to agent skills"
    required: false
    default: "~/.agents/skills/"
  skills:
    description: >
      New-line separated list of skills to install.
      Format: package:skill1,skill2;package2:skill3 (e.g., davidkiss/smart-ai-skills:coding,brainstorming)
    required: false
    default: |
      davidkiss/smart-ai-skills:reflection,brainstorming,task-breakdown,coding,subagent-task-execution
      obra/superpowers:systematic-debugging
  github-token:
    description: "GitHub token"
    required: false
    default: ${{ secrets.GITHUB_TOKEN }}

outputs:
  response-file:
    description: "Path to generated response file"
    value: ${{ steps.setup.outputs.response-file }}
  pr-url:
    description: "URL of created PR"
    value: ${{ steps.post-response.outputs.pr-url }}

runs:
  using: "composite"
  steps:
    - id: setup
      name: Setup environment
      shell: bash
      run: |
        echo "response-file=bot_response.md" >> $GITHUB_OUTPUT
        ls -al ${{ github.action_path }}/package-lock.json
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Acknowledge Comment # reaction to issue is not supported atm
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "issue_comment" ]; then
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content='eyes'
        fi
      env:
        GH_TOKEN: ${{ inputs.github-token }}

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Prepare Lockfile for Caching
      shell: bash
      run: cp ${{ github.action_path }}/package-lock.json .codingbot-package-lock.json

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: .codingbot-package-lock.json

    - name: Install dependencies
      shell: bash
      run: |
        cd ${{ github.action_path }}
        npm install

    - name: Add Agent skills
      shell: bash
      run: |
        SKILLS=$(echo "${{ inputs.skills }}" | tr '\n' ';')
        bash ${{ github.action_path }}/scripts/install_skills.sh "$SKILLS"

    - name: Fetch Issue Data
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
      run: gh issue view $ISSUE_NUMBER --json body,comments,author,number,title > chat_history.json

    - name: Run Agent
      shell: bash
      env:
        MODEL: ${{ inputs.model }}
        PROMPT_TEMPLATE: ${{ inputs.prompt-template }}
        SKILLS_PATH: ${{ inputs.skills-path }}
        GOOGLE_API_KEY: ${{ env.GOOGLE_API_KEY }}
        OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
      run: npx tsx ${{ github.action_path }}/src/index.ts chat_history.json

    - id: post-response
      name: Post Response to GitHub
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        ISSUE_TITLE: ${{ github.event.issue.title }}
      run: bash ${{ github.action_path }}/scripts/post_response.sh "$ISSUE_NUMBER" "$ISSUE_TITLE"
      continue-on-error: true
